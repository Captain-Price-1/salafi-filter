name: Scrape and deploy

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours, on the hour (UTC)
  workflow_dispatch:         # also allow manual trigger from the Actions tab

# GitHub Pages deploy needs these permissions on the workflow's GITHUB_TOKEN.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false  # never cancel a running scrape; queue if a new one starts

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite database from cache
        uses: actions/cache@v4
        with:
          path: profiles.db
          key: profiles-db-${{ github.run_id }}
          restore-keys: |
            profiles-db-

      - name: Restore Telegram session from cache
        uses: actions/cache@v4
        with:
          path: telegram-session.session
          key: telegram-session-${{ github.run_id }}
          restore-keys: |
            telegram-session-

      - name: Bootstrap session from secret on first run
        run: |
          if [ ! -f telegram-session.session ]; then
            echo "No cached session — bootstrapping from TELEGRAM_SESSION_B64 secret."
            echo "${{ secrets.TELEGRAM_SESSION_B64 }}" | base64 -d > telegram-session.session
          else
            echo "Restored session from cache."
          fi

      - name: Scrape Telegram, re-parse all rows, rebuild HTML
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE:    ${{ secrets.TELEGRAM_PHONE }}
          CHANNEL:           ${{ secrets.CHANNEL }}
        run: |
          python scrape.py
          # Re-run the parser over every stored row so parser improvements
          # automatically back-fill the whole DB (not just newly scraped rows).
          python reparse.py
          python build_html.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (./public)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
